name: Publish

on:
  push:
    branches:
      - master
    paths:
      - .dockerignore
      - Dockerfile
      - api/**
      - charts/**
      - cmd/**
      - config/**
      - go.mod
      - go.sum
      - internal/**
      - Taskfile.yml
      - mise.toml
      - version.json
  workflow_dispatch:

permissions: {}

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CHART_REGISTRY: oci://ghcr.io/${{ github.repository_owner }}/charts

jobs:
  publish:
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
      packages: write
      pull-requests: read
    name: Publish image and charts
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Restore Go cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-${{ github.workflow }}-go-${{ hashFiles('go.mod', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.workflow }}-go-

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Restore repo-local cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: bin
          key: ${{ runner.os }}-${{ github.workflow }}-local-tools-${{ hashFiles('mise.toml', 'Taskfile.yml', '.custom-gcl.yml', 'go.mod', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.workflow }}-local-tools-

      - name: Compute NBGV version
        id: version
        run: |
          version="$(nbgv get-version -v SemVer2)"
          app_version="$(nbgv get-version -v AssemblyInformationalVersion)"
          short_sha="$(nbgv get-version -v GitCommitIdShort)"
          {
            echo "version=${version}"
            echo "app_version=${app_version}"
            echo "short_sha=${short_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Verify before publishing
        run: task ci

      - name: Package Helm charts
        env:
          CHART_VERSION: ${{ steps.version.outputs.version }}
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: task chart-package

      - name: Create draft GitHub release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_REPOSITORY: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          CRD_CHART_REPOSITORY: oci://ghcr.io/${{ github.repository_owner }}/charts/omni-cluster-operator-crds
          CHART_REPOSITORY: oci://ghcr.io/${{ github.repository_owner }}/charts/omni-cluster-operator
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          tag_name="v${VERSION}"
          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"

          if gh release view "${tag_name}" >/dev/null 2>&1; then
            echo "Release ${tag_name} already exists; continuing artifact verification."
            {
              echo "cleanup=false"
              echo "created=false"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "cleanup=true" >> "${GITHUB_OUTPUT}"

          notes="$(printf '%s\n' \
            "Published after verifying the operator image and both Helm charts in GHCR." \
            "" \
            "Release log: https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_SHA}/CHANGELOG.md" \
            "" \
            "## OCI artifacts" \
            "" \
            "- Image: \`${IMAGE_REPOSITORY}:${VERSION}\`" \
            "- CRD chart: \`${CRD_CHART_REPOSITORY} --version ${VERSION}\`" \
            "- Operator chart: \`${CHART_REPOSITORY} --version ${VERSION}\`")"

          release_flags=(
            --draft
            --target "${GITHUB_SHA}"
            --title "${tag_name}"
            --notes "${notes}"
            --generate-notes
          )

          if [[ "${VERSION}" == *-* ]]; then
            release_flags+=(--prerelease)
          fi

          gh release create "${tag_name}" \
            "dist/charts/omni-cluster-operator-crds-${VERSION}.tgz#omni-cluster-operator-crds-${VERSION}.tgz" \
            "dist/charts/omni-cluster-operator-${VERSION}.tgz#omni-cluster-operator-${VERSION}.tgz" \
            "${release_flags[@]}"

          echo "created=true" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Login to GHCR for images
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push operator image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        timeout-minutes: 20
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.version.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=omni-cluster-operator
            org.opencontainers.image.description=Kubernetes operator for Sidero Omni cluster lifecycles
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.app_version }}

      - name: Login to GHCR for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Setup ORAS
        uses: oras-project/setup-oras@1d808f7d7f6995cc68b7bf507bfe5c5446e1dc9d # v2.0.1

      - name: Push Helm charts to GHCR OCI registry
        env:
          CRD_CHART_REPOSITORY: oci://ghcr.io/${{ github.repository_owner }}/charts/omni-cluster-operator-crds
          CHART_REPOSITORY: oci://ghcr.io/${{ github.repository_owner }}/charts/omni-cluster-operator
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          push_chart() {
            local package_path="${1}"
            local chart_repository="${2}"

            if helm show chart "${chart_repository}" --version "${VERSION}" >/dev/null 2>&1; then
              echo "${chart_repository}:${VERSION} already exists; skipping push."
              return 0
            fi

            helm push "${package_path}" "${CHART_REGISTRY}"
          }

          push_chart "dist/charts/omni-cluster-operator-crds-${VERSION}.tgz" "${CRD_CHART_REPOSITORY}"
          push_chart "dist/charts/omni-cluster-operator-${VERSION}.tgz" "${CHART_REPOSITORY}"

      - name: Push Artifact Hub metadata to GHCR OCI registry
        run: |
          oras push "ghcr.io/${{ github.repository_owner }}/charts/omni-cluster-operator-crds:artifacthub.io" \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            "charts/omni-cluster-operator-crds/artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml"
          oras push "ghcr.io/${{ github.repository_owner }}/charts/omni-cluster-operator:artifacthub.io" \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            "charts/omni-cluster-operator/artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml"

      - name: Verify GHCR pulls
        env:
          IMAGE_REPOSITORY: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          CRD_CHART_REPOSITORY: oci://ghcr.io/${{ github.repository_owner }}/charts/omni-cluster-operator-crds
          CHART_REPOSITORY: oci://ghcr.io/${{ github.repository_owner }}/charts/omni-cluster-operator
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          docker buildx imagetools inspect "${IMAGE_REPOSITORY}:${VERSION}" >/dev/null
          docker buildx imagetools inspect "${IMAGE_REPOSITORY}:latest" >/dev/null
          helm show chart "${CRD_CHART_REPOSITORY}" --version "${VERSION}" >/dev/null
          helm show chart "${CHART_REPOSITORY}" --version "${VERSION}" >/dev/null

      - name: Publish GitHub release
        if: steps.release.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          gh release edit "${TAG_NAME}" --draft=false --latest

      - name: Delete draft GitHub release after failure
        if: failure() && steps.release.outputs.cleanup == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: gh release delete "${TAG_NAME}" --cleanup-tag --yes || true
