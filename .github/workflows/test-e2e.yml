name: E2E Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions: {}

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-e2e:
    permissions:
      contents: read
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Restore Go cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-${{ github.workflow }}-go-${{ hashFiles('go.mod', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.workflow }}-go-

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Restore repo-local cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: bin
          key: ${{ runner.os }}-${{ github.workflow }}-local-tools-${{ hashFiles('mise.toml', 'Taskfile.yml', '.custom-gcl.yml', 'go.mod', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.workflow }}-local-tools-

      - name: Verify kind installation
        run: kind version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build manager image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        timeout-minutes: 15
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: omni-cluster-operator:e2e
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Running Test e2e
        env:
          E2E_SKIP_MANAGER_IMAGE_BUILD: "true"
        run: task test-e2e
