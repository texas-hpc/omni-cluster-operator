name: Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions: {}

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    permissions:
      contents: read
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Restore Go cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-${{ github.workflow }}-go-${{ hashFiles('go.mod', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.workflow }}-go-

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Restore repo-local cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: bin
          key: ${{ runner.os }}-${{ github.workflow }}-local-tools-${{ hashFiles('mise.toml', 'Taskfile.yml', '.custom-gcl.yml', 'go.mod', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.workflow }}-local-tools-

      - name: Running Tests
        run: task test
