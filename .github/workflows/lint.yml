name: Lint

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions: {}

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    permissions:
      contents: read
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Restore Go cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-${{ github.workflow }}-go-${{ hashFiles('go.mod', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.workflow }}-go-

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Restore repo-local cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: bin
          key: ${{ runner.os }}-${{ github.workflow }}-local-tools-${{ hashFiles('mise.toml', 'Taskfile.yml', '.custom-gcl.yml', 'go.mod', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.workflow }}-local-tools-

      - name: Check pushed commit message
        if: >-
          github.event_name == 'push' &&
          github.event.before != '0000000000000000000000000000000000000000' &&
          !startsWith(github.event.head_commit.message, 'Merge pull request #') &&
          !contains(github.event.head_commit.message, '(#')
        env:
          COMMITLINT_FROM: ${{ github.event.before }}
          COMMITLINT_TO: ${{ github.sha }}
        run: task commitlint
      - name: Check pull request commit messages
        if: github.event_name == 'pull_request'
        env:
          COMMITLINT_FROM: ${{ github.event.pull_request.base.sha }}
          COMMITLINT_TO: ${{ github.event.pull_request.head.sha }}
        run: task commitlint
      - name: Check linter configuration
        run: task lint-config
      - name: Run linter
        run: task lint
      - name: Check Helm charts
        env:
          CHART_VERSION: 0.0.0-ci
          APP_VERSION: 0.0.0-ci
          IMAGE_TAG: 0.0.0-ci
        run: |
          task chart-docs-check
          task chart-lint
          task chart-template >/dev/null
          task chart-package
