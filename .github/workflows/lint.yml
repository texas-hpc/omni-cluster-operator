name: Lint

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions: {}

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    permissions:
      contents: read
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Restore Go cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-${{ github.workflow }}-go-${{ hashFiles('go.mod', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.workflow }}-go-

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Restore repo-local cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: bin
          key: ${{ runner.os }}-${{ github.workflow }}-local-tools-${{ hashFiles('mise.toml', 'Taskfile.yml', '.custom-gcl.yml', 'go.mod', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.workflow }}-local-tools-

      - name: Check pushed commit message
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        env:
          COMMITLINT_FROM: ${{ github.event.before }}
          COMMITLINT_TO: ${{ github.sha }}
        run: task commitlint
      - name: Check pull request commit messages
        if: github.event_name == 'pull_request'
        env:
          COMMITLINT_FROM: ${{ github.event.pull_request.base.sha }}
          COMMITLINT_TO: ${{ github.event.pull_request.head.sha }}
        run: task commitlint
      - name: Check linter configuration
        run: task lint-config
      - name: Run linter
        run: task lint
      - name: Check Helm charts
        env:
          CHART_VERSION: 0.0.0-ci
          APP_VERSION: 0.0.0-ci
          IMAGE_TAG: 0.0.0-ci
        run: |
          task chart-docs-check
          task chart-lint
          task chart-template >/dev/null
          task chart-package
