site_name: omni-cluster-operator
site_description: User documentation for the Kubernetes operator that manages Sidero Omni cluster templates without replacing Omni.
site_url: https://texas-hpc.github.io/omni-cluster-operator/
repo_url: https://github.com/texas-hpc/omni-cluster-operator
repo_name: texas-hpc/omni-cluster-operator

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Cluster Lifecycle: getting-started/create-a-cluster.md
      - Manage Cilium: getting-started/install-cilium.md
      - NVIDIA GPU Workloads: getting-started/nvidia-gpu.md
      - GitOps: getting-started/gitops.md
      - Upgrading: getting-started/upgrading.md
  - Concepts:
      - Choosing an Operator: concepts/choosing-an-operator.md
      - Resource Model: concepts/resource-model.md
      - Reconciliation: concepts/reconciliation.md
  - Reference:
      - API Reference: reference/api.md
      - Helm Chart: reference/helm-chart.md
      - Release Notes: reference/release-notes.md
  - Guides:
      - Debugging: guides/debugging.md
  - Developer:
      - Local Development: guides/local-development.md
      - Local Omni Fixture: local-omni-fixture.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

strict: true
