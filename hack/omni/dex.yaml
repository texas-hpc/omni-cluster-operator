apiVersion: v1
kind: ConfigMap
metadata:
  name: omni-dex
  namespace: omni-system
data:
  dex.yaml: |
    issuer: http://omni-dex.omni-system.svc.cluster.local:5556/dex
    storage:
      type: memory
    web:
      http: 0.0.0.0:5556
    enablePasswordDB: true
    staticClients:
      - name: Omni
        id: omni
        secret: omni-dex-secret
        redirectURIs:
          - http://omni.omni-system.svc.cluster.local:8080/oidc/consume
    staticPasswords:
      - email: admin@omni.local
        username: admin
        preferredUsername: admin
        # Password: password
        hash: "$2a$10$33EMT0cawx2R0g9I0vG3IO7on8Bh2Wg.IJ0Xl5i.0zI2yXxwIb1E."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omni-dex
  namespace: omni-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: omni-dex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omni-dex
    spec:
      containers:
        - name: dex
          image: ghcr.io/dexidp/dex:v2.41.1
          args:
            - dex
            - serve
            - /etc/dex/dex.yaml
          ports:
            - name: http
              containerPort: 5556
          volumeMounts:
            - name: config
              mountPath: /etc/dex
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: omni-dex
---
apiVersion: v1
kind: Service
metadata:
  name: omni-dex
  namespace: omni-system
spec:
  selector:
    app.kubernetes.io/name: omni-dex
  ports:
    - name: http
      port: 5556
      targetPort: http
