# This rule is not used by the project omni-cluster-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full access to omni.texashpc.com resources.
# This role is intended for administrators who need complete control over these resources.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: omni-cluster-operator
    app.kubernetes.io/managed-by: kustomize
  name: omnicilium-admin-role
rules:
- apiGroups:
  - omni.texashpc.com
  resources:
  - omniciliums
  verbs:
  - '*'
- apiGroups:
  - omni.texashpc.com
  resources:
  - omniciliums/status
  verbs:
  - get
