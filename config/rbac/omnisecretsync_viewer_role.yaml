---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: omnisecretsync-viewer-role
rules:
  - apiGroups:
      - omni.texashpc.com
    resources:
      - omnisecretsyncs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - omni.texashpc.com
    resources:
      - omnisecretsyncs/status
    verbs:
      - get
