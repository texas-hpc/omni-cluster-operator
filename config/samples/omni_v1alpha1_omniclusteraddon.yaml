apiVersion: omni.texashpc.com/v1alpha1
kind: OmniClusterAddon
metadata:
  labels:
    app.kubernetes.io/name: omni-cluster-operator
    app.kubernetes.io/managed-by: kustomize
  name: edge-sample-cilium
spec:
  clusterRef:
    name: edge-sample
  manifestName: cilium
  mode: full
  helm:
    repository: https://helm.cilium.io/
    chart: cilium
    version: 1.19.3
    releaseName: cilium
    namespace: kube-system
    values:
      ipam:
        mode: kubernetes
      kubeProxyReplacement: true
      k8sServiceHost: localhost
      k8sServicePort: 7445
      cgroup:
        autoMount:
          enabled: false
        hostRoot: /sys/fs/cgroup
      securityContext:
        capabilities:
          ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
          cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
      gatewayAPI:
        enabled: true
        enableAlpn: true
        enableAppProtocol: true
