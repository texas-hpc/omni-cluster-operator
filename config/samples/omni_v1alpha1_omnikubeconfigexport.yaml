apiVersion: omni.texashpc.com/v1alpha1
kind: OmniKubeconfigExport
metadata:
  name: edge-automation-kubeconfig
  namespace: omni-cluster-operator-system
spec:
  clusterRef:
    name: edge
  targetSecretRef:
    name: edge-automation-kubeconfig
  serviceAccount:
    user: edge-automation
    groups:
      - cluster-automation
  ttl: 24h
  renewBefore: 4h
  deletionPolicy: Delete
