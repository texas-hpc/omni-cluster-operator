apiVersion: omni.texashpc.com/v1alpha1
kind: OmniKubeconfigExport
metadata:
  labels:
    app.kubernetes.io/name: omni-cluster-operator
    app.kubernetes.io/managed-by: kustomize
  name: edge-sample-gitops-kubeconfig
  namespace: omni-cluster-operator-system
spec:
  clusterRef:
    name: edge-sample
  targetSecretRef:
    name: edge-sample-gitops-kubeconfig
    key: workload.kubeconfig
  serviceAccount:
    user: edge-sample-gitops
    groups:
    - cluster-gitops
  ttl: 12h
  renewBefore: 2h
  deletionPolicy: Orphan
