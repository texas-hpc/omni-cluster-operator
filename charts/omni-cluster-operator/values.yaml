nameOverride: ""
fullnameOverride: ""

namespace:
  create: false

image:
  repository: ghcr.io/texas-hpc/omni-cluster-operator
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 1

# By default, the manager watches only the Helm release namespace and receives
# namespace-scoped RBAC. Set this to true for one operator instance to reconcile
# Omni resources across every namespace.
watchAllNamespaces: false

leaderElection:
  enabled: true

metrics:
  enabled: true
  secure: true
  port: 8443
  service:
    annotations: {}
    labels: {}
  rbac:
    enabled: true

webhook:
  enabled: true
  port: 9443
  failurePolicy: Fail
  certDir: /tmp/k8s-webhook-server/serving-certs

certManager:
  enabled: true

rbac:
  create: true
  helperRoles:
    create: true

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  kubectl.kubernetes.io/default-container: manager

podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}

healthProbe:
  bindAddress: :8081
  port: 8081
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10

extraArgs: []
extraEnv: []
extraVolumes: []
extraVolumeMounts: []

terminationGracePeriodSeconds: 10
