{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "omni-cluster-operator.fullname" . }}-leader-election-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "omni-cluster-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "omni-cluster-operator.fullname" . }}-manager-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "omni-cluster-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - omni.texashpc.com
    resources:
      - omniclusters
      - omniconnections
      - omnicontrolplanes
      - omnihelmreleases
      - omnikubeconfigexports
      - omnimachines
      - omniworkers
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - omni.texashpc.com
    resources:
      - omniclusters/finalizers
      - omniconnections/finalizers
      - omnicontrolplanes/finalizers
      - omnihelmreleases/finalizers
      - omnikubeconfigexports/finalizers
      - omnimachines/finalizers
      - omniworkers/finalizers
    verbs:
      - update
  - apiGroups:
      - omni.texashpc.com
    resources:
      - omniclusters/status
      - omniconnections/status
      - omnicontrolplanes/status
      - omnihelmreleases/status
      - omnikubeconfigexports/status
      - omnimachines/status
      - omniworkers/status
    verbs:
      - get
      - patch
      - update
{{- if and .Values.metrics.enabled .Values.metrics.rbac.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "omni-cluster-operator.fullname" . }}-metrics-auth-role
  labels:
    {{- include "omni-cluster-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "omni-cluster-operator.fullname" . }}-metrics-reader
  labels:
    {{- include "omni-cluster-operator.labels" . | nindent 4 }}
rules:
  - nonResourceURLs:
      - /metrics
    verbs:
      - get
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "omni-cluster-operator.fullname" . }}-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "omni-cluster-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "omni-cluster-operator.fullname" . }}-leader-election-role
subjects:
  - kind: ServiceAccount
    name: {{ include "omni-cluster-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "omni-cluster-operator.fullname" . }}-manager-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "omni-cluster-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "omni-cluster-operator.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "omni-cluster-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- if and .Values.metrics.enabled .Values.metrics.rbac.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "omni-cluster-operator.fullname" . }}-metrics-auth-rolebinding
  labels:
    {{- include "omni-cluster-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "omni-cluster-operator.fullname" . }}-metrics-auth-role
subjects:
  - kind: ServiceAccount
    name: {{ include "omni-cluster-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
