{{- if and .Values.webhook.enabled .Values.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "omni-cluster-operator.issuerName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "omni-cluster-operator.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "omni-cluster-operator.servingCertName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "omni-cluster-operator.labels" . | nindent 4 }}
spec:
  dnsNames:
    - {{ include "omni-cluster-operator.webhookServiceName" . }}.{{ .Release.Namespace }}.svc
    - {{ include "omni-cluster-operator.webhookServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: {{ include "omni-cluster-operator.issuerName" . }}
  secretName: {{ include "omni-cluster-operator.webhookSecretName" . }}
{{- end }}
